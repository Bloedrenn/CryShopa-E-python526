{% extends 'base.html' %}

{% block title %}Список сообщений{% endblock %}

{% block body %}
  <h1>Список сообщений</h1>
  <a href="{{ url_for('create_message_page') }}">Создать новое сообщение</a>
  {% if messages %}
    <ul>
      {% for message in messages %}
        <li>
          <a href="/web/messages/{{ message.id }}">{{ message.content }}</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>Сообщений пока нет.</p>
  {% endif %}
{% endblock %}
