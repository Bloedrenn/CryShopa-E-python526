{% extends 'base.html' %}

{% block title %}Создать сообщение{% endblock %}

{% block body %}
  <h1>Создать новое сообщение</h1>
  <form method="POST" action="/web/messages">
    <label for="contentInput">Сообщение:</label>
    <textarea id="contentInput" name="content" required></textarea>
    <button type="submit">Отправить</button>
  </form>
  <a href="/web/messages">Вернуться к списку</a>
{% endblock %}
